name: CD

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  bump-build-publish:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install release tooling
        run: python -m pip install --upgrade build bump2version

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump_version
        run: |
          bump2version patch
          NEW_VERSION=$(python - <<'PY'
          from pathlib import Path
          namespace = {}
          exec(Path("src/scix/__init__.py").read_text(encoding="utf-8"), namespace)
          print(namespace["__version__"])
          PY
          )
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

      - name: Push version bump and tag
        run: git push origin HEAD:main --follow-tags

      - name: Comment on merged PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Published scix v${{ steps.bump_version.outputs.new_version }} to PyPI.`
            })
