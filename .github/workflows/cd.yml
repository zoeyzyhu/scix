name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  create_tag:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: next_version
        run: |
          # Get latest tag
          LATEST=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          # Default: patch bump (could also use PR label for minor/major)
          NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"

          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git config user.name "bump-bot"
          git config user.email "bump-bot@users.noreply.github.com"
          git tag ${{ steps.next_version.outputs.next_version }}
          git push origin ${{ steps.next_version.outputs.next_version }}
