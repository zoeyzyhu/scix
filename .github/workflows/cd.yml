name: Auto Tag on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  create_tag:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Generate bump-bot token
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUMP_BOT_APP_ID }}
          private-key: ${{ secrets.BUMP_BOT_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Determine next version
        id: next_version
        run: |
          LATEST=$(git describe --tags --abbrev=0 || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | cut -d. -f1 | sed 's/v//')
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)

          NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.next_version.outputs.next_version }}
        run: |
          git config user.name "bump-bot[app]"
          git config user.email "bump-bot[app]@users.noreply.github.com"

          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "Tag $TAG already exists on origin; skipping push."
            exit 0
          fi

          git tag "$TAG"
          git push origin "$TAG"
