name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: python -m pip install -e .[dev]

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Test
        run: pytest

      - name: Build
        run: python -m build

      - name: Validate scaffold sync
        run: scix sync --check
